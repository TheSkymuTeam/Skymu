name: Skymu Nightly

on:
  push:
    branches: [ "**" ]

jobs:
  build:
    runs-on: windows-latest
    
    strategy:
      matrix:
        # This creates two parallel runs: one for x86 and one for x64
        architecture: [x86, x64]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET Core SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: 1. Build MiddleMan Project
      # -r (runtime) specifies the architecture, which overrides "Any CPU"
      run: dotnet build MiddleMan/MiddleMan.csproj --configuration Release -r win-${{ matrix.architecture }} --self-contained false

    - name: 2. Build Entire Solution
      run: dotnet build Skymu.sln --configuration Release -p:RuntimeIdentifier=win-${{ matrix.architecture }} --no-restore --self-contained false

    - name: 3. Export Release Folder to Artifacts
      uses: actions/upload-artifact@v4
      with:
        # Separate the names so the x86 and x64 files don't overwrite each other
        name: nightly-build-${{ matrix.architecture }}
        path: '**/bin/win-${{ matrix.architecture }}/Release/'
        retention-days: 7
